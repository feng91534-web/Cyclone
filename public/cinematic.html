    const originalError = console.error;
    console.error = (...args) => {

      originalError.apply(console, args);

    window.FadingVideo = function FadingVideo({ src, className, style }) {
      const videoRef = React.useRef(null);
      const animationRef = React.useRef(null);
      const fadingOutRef = React.useRef(false);
      const FADE_MS = 500;

      const fadeTo = (target, duration) => {
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
        }

        const start = parseFloat(videoRef.current.style.opacity) || 0;
        const startTime = performance.now();

        const animate = (currentTime) => {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = start + (target - start) * eased;
          
          videoRef.current.style.opacity = current;

          if (progress < 1) {
            animationRef.current = requestAnimationFrame(animate);
          }
        };

        animationRef.current = requestAnimationFrame(animate);
      };

      React.useEffect(() => {
        const video = videoRef.current;
        
        const handleLoadedData = () => {
          video.style.opacity = '0';
          video.play();
          fadeTo(1, FADE_MS);
        };

        const handleTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration - video.currentTime <= 0.55 && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const handleEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            video.play();
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
          }
          video.removeEventListener('loadeddata', handleLoadedData);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, [src]);

      return (
        <video
          ref={videoRef}
          className={className}
          style={{ ...style, opacity: 0 }}
          muted
          playsInline
          preload="auto"
        >
          <source src={src} type="video/mp4" />
        </video>
      );
    };

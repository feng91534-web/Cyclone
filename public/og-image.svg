<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#13131a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decorative grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(96, 88)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <g fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,0)">
      <circle cx="32" cy="32" r="16" opacity="0.4"/>
      <path d="M20 32 Q32 18 44 32 Q32 46 20 32 Z" fill="#ffffff" stroke="none"/>
      <circle cx="32" cy="32" r="3.5" fill="#6366f1" stroke="none"/>
    </g>
    <text x="84" y="42" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#ffffff">GlobalGrowth</text>
  </g>

  <!-- Badge -->
  <g transform="translate(96, 230)">
    <rect width="280" height="40" rx="20" fill="#ffffff" fill-opacity="0.06"/>
    <circle cx="24" cy="20" r="4" fill="#22c55e"/>
    <text x="40" y="26" font-family="Inter, sans-serif" font-size="16" fill="#a1a1aa">AI-Powered Growth Platform</text>
  </g>

  <!-- Headline -->
  <text x="96" y="350" font-family="Inter, sans-serif" font-size="68" font-weight="800" fill="url(#accent)">Global Trade,</text>
  <text x="96" y="430" font-family="Inter, sans-serif" font-size="68" font-weight="800" fill="#ffffff">Reimagined by AI.</text>

  <!-- Subtext -->
  <text x="96" y="500" font-family="Inter, sans-serif" font-size="22" fill="#a1a1aa">Facebook Ads · WhatsApp Sales · Overseas Acquisition</text>
  <text x="96" y="534" font-family="Inter, sans-serif" font-size="22" fill="#a1a1aa">Logistics · Payments · Training</text>

  <!-- Stats -->
  <g transform="translate(96, 565)" font-family="Inter, sans-serif">
    <text x="0" y="0" font-size="18" font-weight="700" fill="#ffffff">2000+</text>
    <text x="0" y="22" font-size="13" fill="#71717a">Clients</text>
    <text x="160" y="0" font-size="18" font-weight="700" fill="#ffffff">150+</text>
    <text x="160" y="22" font-size="13" fill="#71717a">Countries</text>
    <text x="320" y="0" font-size="18" font-weight="700" fill="#ffffff">300%</text>
    <text x="320" y="22" font-size="13" fill="#71717a">Revenue Growth</text>
  </g>
</svg>
